services:
  - type: web
    name: tgr-cafeteria-api
    runtime: docker
    plan: free
    branch: codex/deploy-render-sites
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: The Gentlemen's Roast
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_PERSISTENT
        value: "true"
      - key: DB_EMULATE_PREPARES
        value: "false"
      - key: SANCTUM_EXPIRATION
        value: "480"
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: TGR_ALLOWED_ORIGINS
        sync: false
